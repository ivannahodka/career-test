<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="6" fill="#3b82f6"/>
  <!-- Main title -->
  <text x="600" y="200" font-family="system-ui,sans-serif" font-size="72" font-weight="700" fill="white" text-anchor="middle">🧭 Тест профориентации</text>
  <!-- Subtitle EN -->
  <text x="600" y="270" font-family="system-ui,sans-serif" font-size="40" font-weight="400" fill="#94a3b8" text-anchor="middle">Career Orientation Test</text>
  <!-- Divider -->
  <rect x="480" y="305" width="240" height="2" fill="#3b82f6" rx="1"/>
  <!-- Stats row -->
  <text x="200" y="390" font-family="system-ui,sans-serif" font-size="52" font-weight="700" fill="#3b82f6" text-anchor="middle">6</text>
  <text x="200" y="430" font-family="system-ui,sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle">областей</text>
  <text x="420" y="390" font-family="system-ui,sans-serif" font-size="52" font-weight="700" fill="#3b82f6" text-anchor="middle">40</text>
  <text x="420" y="430" font-family="system-ui,sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle">профессий</text>
  <text x="640" y="390" font-family="system-ui,sans-serif" font-size="52" font-weight="700" fill="#3b82f6" text-anchor="middle">9</text>
  <text x="640" y="430" font-family="system-ui,sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle">языков</text>
  <text x="880" y="390" font-family="system-ui,sans-serif" font-size="52" font-weight="700" fill="#3b82f6" text-anchor="middle">2</text>
  <text x="880" y="430" font-family="system-ui,sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle">уровня теста</text>
  <text x="1080" y="390" font-family="system-ui,sans-serif" font-size="52" font-weight="700" fill="#22c55e" text-anchor="middle">free</text>
  <text x="1080" y="430" font-family="system-ui,sans-serif" font-size="24" fill="#94a3b8" text-anchor="middle">бесплатно</text>
  <!-- Domain emojis -->
  <text x="600" y="530" font-family="system-ui,sans-serif" font-size="36" text-anchor="middle">💻 🎨 💼 🔬 👩‍🏫 ⚙️</text>
  <!-- URL -->
  <text x="600" y="600" font-family="system-ui,sans-serif" font-size="22" fill="#64748b" text-anchor="middle">ivannahodka.github.io/career-test</text>
